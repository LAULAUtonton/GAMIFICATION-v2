<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vocabulary Station - THE PIT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #fdf4ff;
  --bg2: #a855f7;
  --bg3: #581c87;
  --panel: #ffffff;
  --accent: #a855f7;
  --accent2: #c084fc;
  --text: #1f2937;
  --muted: #6b7280;
  --success: #22c55e;
  --error: #ef4444;
  --warning: #f59e0b;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: radial-gradient(ellipse at top, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
  min-height: 100vh;
  padding: 15px;
}

.container { max-width: 1400px; margin: 0 auto; }

header {
  background: var(--panel);
  border-radius: 16px;
  padding: 16px 24px;
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  margin: 0 0 12px 0;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(20px, 3vw, 28px);
  color: var(--bg3);
  letter-spacing: 2px;
}

.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}

select, button {
  padding: 8px 14px;
  border-radius: 10px;
  border: 2px solid var(--accent);
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  background: white;
  color: var(--bg3);
  transition: all 0.2s;
}

button:hover:not(:disabled) {
  background: var(--accent);
  color: white;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.back-btn {
  background: var(--bg3);
  color: white;
  border-color: var(--bg3);
}

.mode-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.mode-tab {
  padding: 10px 16px;
  border-radius: 10px;
  border: 2px solid #e5e7eb;
  background: white;
  color: var(--text);
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.mode-tab:hover { border-color: var(--accent); background: #faf5ff; }

.mode-tab.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.hud {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.hud-item {
  background: linear-gradient(135deg, var(--accent), var(--bg3));
  color: white;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
}

.activity-screen { display: none; }
.activity-screen.active { display: block; }

/* FLASHCARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.card {
  perspective: 1000px;
  height: 280px;
  cursor: pointer;
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.5s;
  transform-style: preserve-3d;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.card.flipped .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}

.card-front {
  background: linear-gradient(135deg, #fff 0%, #f5f3ff 100%);
  border: 2px solid var(--accent);
}

.card-icon {
  width: 60px;
  height: 60px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-size: 30px;
}

.card-word {
  font-size: 22px;
  font-weight: 800;
  color: var(--bg3);
  margin-bottom: 8px;
}

.card-pos {
  font-size: 10px;
  font-weight: 700;
  color: white;
  background: var(--accent);
  padding: 4px 12px;
  border-radius: 20px;
  text-transform: uppercase;
}

.card-back {
  background: linear-gradient(135deg, var(--accent), var(--bg3));
  transform: rotateY(180deg);
  color: white;
}

.card-translation { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
.card-category { font-size: 11px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 15px; margin-bottom: 8px; }
.card-unit { font-size: 11px; opacity: 0.9; }

/* SORTING */
.sorting-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 800px) { .sorting-container { grid-template-columns: 1fr; } }

.word-bank {
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.word-bank h3 { margin: 0 0 12px 0; color: var(--bg3); font-size: 16px; }

.word-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 80px;
  padding: 12px;
  background: #f5f3ff;
  border-radius: 10px;
  border: 2px dashed var(--accent);
}

.draggable-word {
  padding: 8px 14px;
  background: white;
  border: 2px solid var(--accent);
  border-radius: 8px;
  font-weight: 600;
  font-size: 13px;
  cursor: grab;
  transition: all 0.2s;
  user-select: none;
}

.draggable-word:hover { background: var(--accent); color: white; }
.draggable-word.correct { background: var(--success); border-color: var(--success); color: white; }
.draggable-word.wrong { background: var(--error); border-color: var(--error); color: white; }

.categories-area { display: flex; flex-direction: column; gap: 12px; }

.category-box {
  background: white;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.category-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid #f0f0f0;
}

.category-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.category-title { font-weight: 700; font-size: 14px; color: var(--bg3); }

.category-dropzone {
  min-height: 50px;
  padding: 8px;
  background: #f9fafb;
  border: 2px dashed #d1d5db;
  border-radius: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  transition: all 0.2s;
}

.category-dropzone.drag-over { background: #f5f3ff; border-color: var(--accent); }

/* QUIZ */
.quiz-container {
  background: white;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  max-width: 700px;
  margin: 0 auto;
}

.quiz-progress {
  height: 8px;
  background: #e5e7eb;
  border-radius: 8px;
  margin-bottom: 20px;
  overflow: hidden;
}

.quiz-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--success));
  border-radius: 8px;
  transition: width 0.3s;
}

.quiz-question { font-size: 18px; font-weight: 700; color: var(--bg3); margin-bottom: 8px; text-align: center; }

.quiz-word {
  font-size: 32px;
  font-weight: 800;
  color: var(--accent);
  text-align: center;
  margin-bottom: 24px;
  padding: 16px;
  background: #f5f3ff;
  border-radius: 12px;
}

.quiz-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

.quiz-option {
  padding: 14px;
  border: 2px solid #e5e7eb;
  border-radius: 10px;
  background: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.quiz-option:hover { border-color: var(--accent); background: #faf5ff; }
.quiz-option.correct { border-color: var(--success); background: var(--success); color: white; }
.quiz-option.wrong { border-color: var(--error); background: var(--error); color: white; }

.quiz-feedback {
  margin-top: 16px;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-weight: 600;
}

.quiz-feedback.correct { background: #dcfce7; color: #166534; }
.quiz-feedback.wrong { background: #fee2e2; color: #991b1b; }

.quiz-next-btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

/* HANGMAN */
.hangman-container {
  background: white;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}

.hangman-drawing {
  font-size: 48px;
  margin-bottom: 16px;
  height: 60px;
}

.hangman-word {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: 8px;
  margin-bottom: 8px;
  color: var(--bg3);
  font-family: monospace;
}

.hangman-hint {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
}

.hangman-keyboard {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin-bottom: 16px;
}

.key-btn {
  width: 36px;
  height: 36px;
  border: 2px solid var(--accent);
  border-radius: 6px;
  background: white;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.key-btn:hover:not(:disabled) { background: var(--accent); color: white; }
.key-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.key-btn.correct { background: var(--success); border-color: var(--success); color: white; }
.key-btn.wrong { background: var(--error); border-color: var(--error); color: white; }

.hangman-status { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.hangman-status.win { color: var(--success); }
.hangman-status.lose { color: var(--error); }

/* MEMORY MATCH */
.memory-container {
  max-width: 800px;
  margin: 0 auto;
}

.memory-stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 16px;
  font-weight: 700;
  color: var(--bg3);
}

.memory-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

@media (max-width: 600px) { .memory-grid { grid-template-columns: repeat(3, 1fr); } }

.memory-card {
  aspect-ratio: 1;
  perspective: 1000px;
  cursor: pointer;
}

.memory-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.4s;
  transform-style: preserve-3d;
  border-radius: 12px;
}

.memory-card.flipped .memory-card-inner { transform: rotateY(180deg); }
.memory-card.matched .memory-card-inner { opacity: 0.6; }

.memory-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  text-align: center;
  padding: 8px;
}

.memory-front {
  background: linear-gradient(135deg, var(--accent), var(--bg3));
  color: white;
  font-size: 24px;
}

.memory-back {
  background: white;
  border: 2px solid var(--accent);
  transform: rotateY(180deg);
  color: var(--bg3);
}

/* SENTENCE BUILDER */
.sentence-container {
  background: white;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  max-width: 700px;
  margin: 0 auto;
}

.sentence-word {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
  text-align: center;
  margin-bottom: 8px;
}

.sentence-pos {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}

.sentence-input {
  width: 100%;
  padding: 14px;
  border: 2px solid #e5e7eb;
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  margin-bottom: 12px;
}

.sentence-input:focus { outline: none; border-color: var(--accent); }

.sentence-hint {
  background: #f5f3ff;
  padding: 12px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}

.sentence-examples {
  background: #f9fafb;
  padding: 12px;
  border-radius: 8px;
  margin-top: 12px;
}

.sentence-examples h4 { margin: 0 0 8px 0; font-size: 13px; color: var(--bg3); }
.sentence-examples p { margin: 4px 0; font-size: 13px; color: var(--text); }

.sentence-feedback { margin-top: 12px; padding: 12px; border-radius: 8px; font-weight: 600; }
.sentence-feedback.success { background: #dcfce7; color: #166534; }

/* EXPLORE */
.unit-accordion {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.unit-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: linear-gradient(135deg, var(--accent), var(--bg3));
  color: white;
  cursor: pointer;
}

.unit-title { font-weight: 700; font-size: 14px; }
.unit-meta { font-size: 11px; opacity: 0.9; }
.unit-toggle { font-size: 16px; transition: transform 0.3s; }
.unit-header.expanded .unit-toggle { transform: rotate(180deg); }

.unit-content { display: none; padding: 16px; }
.unit-content.expanded { display: block; }

.unit-sets { display: flex; flex-direction: column; gap: 12px; }

.set-box {
  background: #f9fafb;
  border-radius: 10px;
  padding: 12px;
  border-left: 4px solid var(--accent);
}

.set-title { font-weight: 700; color: var(--bg3); margin-bottom: 8px; font-size: 13px; }

.set-words { display: flex; flex-wrap: wrap; gap: 6px; }

.set-word {
  padding: 5px 10px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active { display: flex; }

.modal-content {
  background: white;
  border-radius: 20px;
  padding: 32px;
  text-align: center;
  max-width: 360px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}

.modal-icon { font-size: 50px; margin-bottom: 16px; }
.modal-title { font-size: 24px; font-weight: 800; color: var(--bg3); margin-bottom: 8px; }
.modal-score { font-size: 40px; font-weight: 800; color: var(--accent); margin-bottom: 16px; }

.modal-btn {
  padding: 12px 24px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

</style>
</head>
<body>

<div class="container">
  <header>
    <h1>VOCABULARY STATION</h1>
    
    <div class="controls">
      <button class="back-btn" onclick="location.href='../index.html'">MENU</button>
      <select id="unitSelect"><option value="all">All Units</option></select>
      <select id="categorySelect"><option value="all">All Categories</option></select>
      <button id="shuffleBtn">Shuffle</button>
      <button id="resetBtn">Reset</button>
    </div>
    
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="flashcards">Flashcards</button>
      <button class="mode-tab" data-mode="sorting">Sorting</button>
      <button class="mode-tab" data-mode="quiz">Quiz</button>
      <button class="mode-tab" data-mode="hangman">Hangman</button>
      <button class="mode-tab" data-mode="memory">Memory</button>
      <button class="mode-tab" data-mode="sentence">Sentences</button>
      <button class="mode-tab" data-mode="explore">Explore</button>
    </div>
    
    <div class="hud">
      <div class="hud-item">Words: <span id="cardCount">0</span></div>
      <div class="hud-item">Score: <span id="score">0</span></div>
      <div class="hud-item">Streak: <span id="streak">0</span></div>
    </div>
  </header>

  <main>
    <div id="flashcards-screen" class="activity-screen active"><div class="grid" id="grid"></div></div>
    <div id="sorting-screen" class="activity-screen">
      <div class="sorting-container">
        <div class="word-bank"><h3>Drag words to categories</h3><div class="word-pool" id="wordPool"></div></div>
        <div class="categories-area" id="categoriesArea"></div>
      </div>
    </div>
    <div id="quiz-screen" class="activity-screen">
      <div class="quiz-container">
        <div class="quiz-progress"><div class="quiz-progress-bar" id="quizProgressBar"></div></div>
        <div class="quiz-question">Which category does this word belong to?</div>
        <div class="quiz-word" id="quizWord">-</div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-feedback" id="quizFeedback" style="display:none"></div>
        <button class="quiz-next-btn" id="quizNextBtn" style="display:none">Next</button>
      </div>
    </div>
    <div id="hangman-screen" class="activity-screen">
      <div class="hangman-container">
        <div class="hangman-drawing" id="hangmanDrawing"></div>
        <div class="hangman-word" id="hangmanWord"></div>
        <div class="hangman-hint" id="hangmanHint"></div>
        <div class="hangman-keyboard" id="hangmanKeyboard"></div>
        <div class="hangman-status" id="hangmanStatus"></div>
        <button id="hangmanNewBtn" style="display:none">New Word</button>
      </div>
    </div>
    <div id="memory-screen" class="activity-screen">
      <div class="memory-container">
        <div class="memory-stats">
          <span>Moves: <span id="memoryMoves">0</span></span>
          <span>Pairs: <span id="memoryPairs">0</span>/<span id="memoryTotal">0</span></span>
        </div>
        <div class="memory-grid" id="memoryGrid"></div>
      </div>
    </div>
    <div id="sentence-screen" class="activity-screen">
      <div class="sentence-container">
        <div class="sentence-word" id="sentenceWord">-</div>
        <div class="sentence-pos" id="sentencePos">noun</div>
        <div class="sentence-hint" id="sentenceHint">Write a sentence using this word</div>
        <input type="text" class="sentence-input" id="sentenceInput" placeholder="Type your sentence here...">
        <button id="sentenceCheckBtn">Check Sentence</button>
        <button id="sentenceNextBtn">Next Word</button>
        <div class="sentence-feedback" id="sentenceFeedback" style="display:none"></div>
        <div class="sentence-examples" id="sentenceExamples" style="display:none"></div>
      </div>
    </div>
    <div id="explore-screen" class="activity-screen"><div id="unitAccordions"></div></div>
  </main>
</div>

<div class="modal" id="resultsModal">
  <div class="modal-content">
    <div class="modal-icon">&#127942;</div>
    <div class="modal-title">Well Done!</div>
    <div class="modal-score" id="finalScore">0/0</div>
    <button class="modal-btn" onclick="closeModal()">Play Again</button>
  </div>
</div>

<script>

            { word: "certificate", example: "I received a certificate." }
          ]
        },
        {
          setId: "u8_pronouns",
          label: "Reflexive pronouns",
          category: "pronouns",
          color: "#ec4899",
          emoji: "&#128100;",
          type: "words",
          items: [
            { word: "myself", example: "I made it myself." },
            { word: "yourself", example: "Did you hurt yourself?" },
            { word: "himself", example: "He taught himself guitar." },
            { word: "herself", example: "She prepared herself for the test." },
            { word: "itself", example: "The cat cleaned itself." },
            { word: "ourselves", example: "We enjoyed ourselves." },
            { word: "yourselves", example: "Help yourselves to food." },
            { word: "themselves", example: "They built it themselves." }
          ]
        }
      ]
    }
  ]
};

// STATE
let currentMode = 'flashcards';
let currentUnit = 'all';
let currentCategory = 'all';
let allCards = [];
let currentCards = [];
let flippedSet = new Set();
let score = 0;
let streak = 0;

// Quiz state
let quizWords = [];
let quizIndex = 0;
let quizCorrect = 0;

// Hangman state
let hangmanWord = '';
let hangmanGuessed = [];
let hangmanWrong = 0;
const HANGMAN_STAGES = ['&#128522;', '&#128528;', '&#128533;', '&#128543;', '&#128553;', '&#128565;', '&#128128;'];
const MAX_WRONG = 6;

// Memory state
let memoryCards = [];
let memoryFlipped = [];
let memoryMatched = [];
let memoryMoves = 0;

// Sentence state
let sentenceIndex = 0;

// HELPERS
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function decode(s) { const t=document.createElement('textarea'); t.innerHTML=s; return t.value; }

function flattenVocab(unitF='all', catF='all') {
  const cards = [];
  for (const unit of VOCAB_DB.units) {
    if (unitF !== 'all' && unit.unit !== Number(unitF)) continue;
    for (const set of unit.sets) {
      if (catF !== 'all' && set.category !== catF) continue;
      if (set.type === 'pairs') {
        set.items.forEach(p => {
          cards.push({ unit: unit.unit, unitTitle: unit.title, setLabel: set.label, category: set.category, color: set.color, front: p.a, back: p.b, pos: 'verb', example: '' });
        });
      } else {
        set.items.forEach(i => {
          cards.push({ unit: unit.unit, unitTitle: unit.title, setLabel: set.label, category: set.category, color: set.color, front: i.word, back: '', pos: getPOS(set.category), example: i.example || '' });
        });
      }
    }
  }
  return cards;
}

function getPOS(cat) {
  if (['verbs','helping','art_verbs','game_verbs','phrasal'].includes(cat)) return 'verb';
  if (['feelings','positive','negative','sense_adj'].includes(cat)) return 'adjective';
  if (['time','instructions','modals','pronouns'].includes(cat)) return 'expression';
  return 'noun';
}

function getCategories(unitF='all') {
  const cats = new Map();
  for (const unit of VOCAB_DB.units) {
    if (unitF !== 'all' && unit.unit !== Number(unitF)) continue;
    for (const set of unit.sets) {
      if (!cats.has(set.category)) {
        cats.set(set.category, { id: set.category, label: set.label, color: set.color, emoji: set.emoji, words: [] });
      }
      const cat = cats.get(set.category);
      if (set.type === 'pairs') set.items.forEach(p => { cat.words.push(p.a); cat.words.push(p.b); });
      else set.items.forEach(i => cat.words.push(i.word));
    }
  }
  return Array.from(cats.values());
}

function updateHUD() {
  document.getElementById('cardCount').textContent = currentCards.length;
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
}

// MODE SWITCHING
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.mode-tab[data-mode="${mode}"]`)?.classList.add('active');
  document.querySelectorAll('.activity-screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`${mode}-screen`)?.classList.add('active');
  
  if (mode === 'flashcards') renderFlashcards();
  else if (mode === 'sorting') initSorting();
  else if (mode === 'quiz') initQuiz();
  else if (mode === 'hangman') initHangman();
  else if (mode === 'memory') initMemory();
  else if (mode === 'sentence') initSentence();
  else if (mode === 'explore') renderExplore();
}

document.querySelectorAll('.mode-tab').forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));

// FLASHCARDS
function renderFlashcards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = currentCards.map((c, i) => `
    <div class="card ${flippedSet.has(i)?'flipped':''}" onclick="flipCard(${i})">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-icon" style="background:${c.color}">&#128218;</div>
          <div class="card-word">${esc(c.front)}</div>
          <div class="card-pos">${esc(c.pos)}</div>
        </div>
        <div class="card-face card-back">
          <div class="card-translation">${c.back ? esc(c.back) : esc(c.front)}</div>
          <div class="card-category">${esc(c.setLabel)}</div>
          <div class="card-unit">Unit ${c.unit}</div>
        </div>
      </div>
    </div>
  `).join('');
  updateHUD();
}

window.flipCard = i => { flippedSet.has(i) ? flippedSet.delete(i) : flippedSet.add(i); renderFlashcards(); };

// SORTING
let sortCats = [], sortWords = [];
function initSorting() {
  sortCats = getCategories(currentUnit).slice(0, 4);
  sortWords = [];
  sortCats.forEach(cat => shuffle(cat.words).slice(0,3).forEach(w => sortWords.push({ word: w, category: cat.id, placed: false })));
  sortWords = shuffle(sortWords);
  renderSorting();
}

function renderSorting() {
  document.getElementById('wordPool').innerHTML = sortWords.filter(w => !w.placed).map(w => `
    <div class="draggable-word" draggable="true" data-word="${esc(w.word)}" data-category="${w.category}"
         ondragstart="dragStart(event)" ondragend="dragEnd(event)">${esc(w.word)}</div>
  `).join('');
  document.getElementById('categoriesArea').innerHTML = sortCats.map(cat => `
    <div class="category-box">
      <div class="category-header">
        <div class="category-icon" style="background:${cat.color}">${decode(cat.emoji)}</div>
        <div class="category-title">${esc(cat.label)}</div>
      </div>
      <div class="category-dropzone" data-category="${cat.id}" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropWord(event)"></div>
    </div>
  `).join('');
  updateHUD();
}

window.dragStart = e => { e.target.classList.add('dragging'); e.dataTransfer.setData('text/plain', JSON.stringify({ word: e.target.dataset.word, category: e.target.dataset.category })); };
window.dragEnd = e => e.target.classList.remove('dragging');
window.dragOver = e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
window.dragLeave = e => e.currentTarget.classList.remove('drag-over');
window.dropWord = e => {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const d = JSON.parse(e.dataTransfer.getData('text/plain'));
  const correct = d.category === e.currentTarget.dataset.category;
  const w = sortWords.find(x => x.word === d.word && !x.placed);
  if (w) {
    w.placed = true;
    const el = document.createElement('div');
    el.className = `draggable-word ${correct?'correct':'wrong'}`;
    el.textContent = d.word;
    e.currentTarget.appendChild(el);
    if (correct) { score += 10; streak++; } else { score = Math.max(0, score-5); streak = 0; }
    updateHUD();
    document.querySelector(`.word-pool .draggable-word[data-word="${d.word}"]`)?.remove();
    if (sortWords.every(x => x.placed)) setTimeout(() => showModal(document.querySelectorAll('.draggable-word.correct').length, sortWords.length), 500);
  }
};

// QUIZ
function initQuiz() {
  const cats = getCategories(currentUnit);
  quizWords = [];
  cats.forEach(cat => cat.words.slice(0,5).forEach(w => quizWords.push({ word: w, correctCategory: cat.label })));
  quizWords = shuffle(quizWords).slice(0, 10);
  quizIndex = 0; quizCorrect = 0;
  renderQuiz();
}

function renderQuiz() {
  if (quizIndex >= quizWords.length) { showModal(quizCorrect, quizWords.length); return; }
  const q = quizWords[quizIndex];
  const cats = getCategories(currentUnit);
  let opts = [q.correctCategory];
  shuffle(cats.filter(c => c.label !== q.correctCategory)).slice(0,3).forEach(c => opts.push(c.label));
  opts = shuffle(opts);
  document.getElementById('quizWord').textContent = q.word;
  document.getElementById('quizProgressBar').style.width = `${(quizIndex/quizWords.length)*100}%`;
  document.getElementById('quizFeedback').style.display = 'none';
  document.getElementById('quizNextBtn').style.display = 'none';
  document.getElementById('quizOptions').innerHTML = opts.map(o => `<button class="quiz-option" onclick="quizAnswer(this,'${esc(o)}','${esc(q.correctCategory)}')">${esc(o)}</button>`).join('');
  updateHUD();
}

window.quizAnswer = (btn, sel, corr) => {
  const correct = sel === corr;
  document.querySelectorAll('.quiz-option').forEach(b => { b.disabled = true; if (b.textContent === corr) b.classList.add('correct'); });
  if (correct) { btn.classList.add('correct'); quizCorrect++; score += 10; streak++; document.getElementById('quizFeedback').textContent = 'Correct!'; document.getElementById('quizFeedback').className = 'quiz-feedback correct'; }
  else { btn.classList.add('wrong'); score = Math.max(0, score-5); streak = 0; document.getElementById('quizFeedback').textContent = `Wrong! It's "${corr}"`; document.getElementById('quizFeedback').className = 'quiz-feedback wrong'; }
  document.getElementById('quizFeedback').style.display = 'block';
  document.getElementById('quizNextBtn').style.display = 'block';
  updateHUD();
};
document.getElementById('quizNextBtn').addEventListener('click', () => { quizIndex++; renderQuiz(); });

// HANGMAN
function initHangman() {
  const words = currentCards.filter(c => c.front.length >= 4 && c.front.length <= 12 && !/\s/.test(c.front));
  if (words.length === 0) { document.getElementById('hangmanWord').textContent = 'No words available'; return; }
  const card = words[Math.floor(Math.random() * words.length)];
  hangmanWord = card.front.toUpperCase();
  hangmanGuessed = [];
  hangmanWrong = 0;
  document.getElementById('hangmanHint').textContent = `Category: ${card.setLabel} | ${card.front.length} letters`;
  document.getElementById('hangmanStatus').textContent = '';
  document.getElementById('hangmanStatus').className = 'hangman-status';
  document.getElementById('hangmanNewBtn').style.display = 'none';
  renderHangman();
}

function renderHangman() {
  document.getElementById('hangmanDrawing').innerHTML = HANGMAN_STAGES[hangmanWrong];
  document.getElementById('hangmanWord').textContent = hangmanWord.split('').map(l => hangmanGuessed.includes(l) ? l : '_').join(' ');
  document.getElementById('hangmanKeyboard').innerHTML = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l => {
    const used = hangmanGuessed.includes(l);
    const correct = used && hangmanWord.includes(l);
    const wrong = used && !hangmanWord.includes(l);
    return `<button class="key-btn ${correct?'correct':''} ${wrong?'wrong':''}" ${used?'disabled':''} onclick="hangmanGuess('${l}')">${l}</button>`;
  }).join('');
  
  // Check win/lose
  const won = hangmanWord.split('').every(l => hangmanGuessed.includes(l));
  const lost = hangmanWrong >= MAX_WRONG;
  if (won) {
    document.getElementById('hangmanStatus').textContent = 'You won! +20 points';
    document.getElementById('hangmanStatus').className = 'hangman-status win';
    document.getElementById('hangmanNewBtn').style.display = 'inline-block';
    score += 20; streak++; updateHUD();
    document.querySelectorAll('.key-btn').forEach(b => b.disabled = true);
  } else if (lost) {
    document.getElementById('hangmanWord').textContent = hangmanWord;
    document.getElementById('hangmanStatus').textContent = `Game over! The word was: ${hangmanWord}`;
    document.getElementById('hangmanStatus').className = 'hangman-status lose';
    document.getElementById('hangmanNewBtn').style.display = 'inline-block';
    streak = 0; updateHUD();
    document.querySelectorAll('.key-btn').forEach(b => b.disabled = true);
  }
}

window.hangmanGuess = l => {
  if (hangmanGuessed.includes(l)) return;
  hangmanGuessed.push(l);
  if (!hangmanWord.includes(l)) hangmanWrong++;
  renderHangman();
};

document.getElementById('hangmanNewBtn').addEventListener('click', initHangman);

// MEMORY
function initMemory() {
  const words = shuffle(currentCards).slice(0, 6);
  memoryCards = shuffle([...words.map((w,i) => ({ id: i, type: 'word', value: w.front, match: i })),
                         ...words.map((w,i) => ({ id: i+6, type: 'cat', value: w.setLabel, match: i }))]);
  memoryFlipped = []; memoryMatched = []; memoryMoves = 0;
  document.getElementById('memoryTotal').textContent = words.length;
  renderMemory();
}

function renderMemory() {
  document.getElementById('memoryMoves').textContent = memoryMoves;
  document.getElementById('memoryPairs').textContent = memoryMatched.length / 2;
  document.getElementById('memoryGrid').innerHTML = memoryCards.map((c, i) => `
    <div class="memory-card ${memoryFlipped.includes(i)||memoryMatched.includes(i)?'flipped':''} ${memoryMatched.includes(i)?'matched':''}" onclick="memoryClick(${i})">
      <div class="memory-card-inner">
        <div class="memory-face memory-front">?</div>
        <div class="memory-face memory-back">${esc(c.value)}</div>
      </div>
    </div>
  `).join('');
  
  if (memoryMatched.length === memoryCards.length) {
    setTimeout(() => showModal(memoryCards.length/2, memoryCards.length/2), 500);
    score += 30; updateHUD();
  }
}

window.memoryClick = i => {
  if (memoryFlipped.length >= 2 || memoryFlipped.includes(i) || memoryMatched.includes(i)) return;
  memoryFlipped.push(i);
  renderMemory();
  
  if (memoryFlipped.length === 2) {
    memoryMoves++;
    const [a, b] = memoryFlipped;
    const ca = memoryCards[a], cb = memoryCards[b];
    if (ca.match === cb.match && ca.type !== cb.type) {
      memoryMatched.push(a, b);
      memoryFlipped = [];
      renderMemory();
    } else {
      setTimeout(() => { memoryFlipped = []; renderMemory(); }, 1000);
    }
  }
};

// SENTENCE
function initSentence() {
  sentenceIndex = 0;
  renderSentence();
}

function renderSentence() {
  if (currentCards.length === 0) { document.getElementById('sentenceWord').textContent = 'No words'; return; }
  if (sentenceIndex >= currentCards.length) sentenceIndex = 0;
  const card = currentCards[sentenceIndex];
  document.getElementById('sentenceWord').textContent = card.front;
  document.getElementById('sentencePos').textContent = card.pos + ' | ' + card.setLabel;
  document.getElementById('sentenceHint').textContent = `Write a sentence using "${card.front}"`;
  document.getElementById('sentenceInput').value = '';
  document.getElementById('sentenceFeedback').style.display = 'none';
  document.getElementById('sentenceExamples').style.display = card.example ? 'block' : 'none';
  document.getElementById('sentenceExamples').innerHTML = card.example ? `<h4>Example:</h4><p>${esc(card.example)}</p>` : '';
}

document.getElementById('sentenceCheckBtn').addEventListener('click', () => {
  const input = document.getElementById('sentenceInput').value.trim().toLowerCase();
  const word = currentCards[sentenceIndex].front.toLowerCase();
  const fb = document.getElementById('sentenceFeedback');
  if (input.length < 5) {
    fb.textContent = 'Write a longer sentence!';
    fb.className = 'sentence-feedback';
    fb.style.display = 'block';
  } else if (!input.includes(word)) {
    fb.textContent = `Your sentence should include "${currentCards[sentenceIndex].front}"`;
    fb.className = 'sentence-feedback';
    fb.style.display = 'block';
  } else {
    fb.textContent = 'Great sentence! +10 points';
    fb.className = 'sentence-feedback success';
    fb.style.display = 'block';
    score += 10; streak++; updateHUD();
  }
});

document.getElementById('sentenceNextBtn').addEventListener('click', () => {
  sentenceIndex++;
  renderSentence();
});

// EXPLORE
function renderExplore() {
  const units = currentUnit === 'all' ? VOCAB_DB.units : VOCAB_DB.units.filter(u => u.unit === Number(currentUnit));
  document.getElementById('unitAccordions').innerHTML = units.map(u => `
    <div class="unit-accordion">
      <div class="unit-header" onclick="toggleUnit(this)">
        <div>
          <div class="unit-title">Unit ${u.unit}: ${esc(u.title)}</div>
          <div class="unit-meta">${u.sets.length} categories | ${countWords(u)} words</div>
        </div>
        <div class="unit-toggle">&#9660;</div>
      </div>
      <div class="unit-content">
        <div class="unit-sets">
          ${u.sets.map(s => `
            <div class="set-box" style="border-left-color:${s.color}">
              <div class="set-title">${decode(s.emoji)} ${esc(s.label)}</div>
              <div class="set-words">${getSetWords(s).map(w => `<span class="set-word">${esc(w)}</span>`).join('')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function countWords(u) { let c=0; u.sets.forEach(s => { c += s.type==='pairs' ? s.items.length*2 : s.items.length; }); return c; }
function getSetWords(s) { return s.type==='pairs' ? s.items.flatMap(p => [p.a, p.b]) : s.items.map(i => i.word); }
window.toggleUnit = h => { h.classList.toggle('expanded'); h.nextElementSibling.classList.toggle('expanded'); };

// MODAL
function showModal(correct, total) {
  document.getElementById('finalScore').textContent = `${correct}/${total}`;
  document.getElementById('resultsModal').classList.add('active');
}

window.closeModal = () => {
  document.getElementById('resultsModal').classList.remove('active');
  setMode(currentMode);
};

// INIT
function initSelects() {
  const uSel = document.getElementById('unitSelect');
  uSel.innerHTML = `<option value="all">All Units</option>` + VOCAB_DB.units.map(u => `<option value="${u.unit}">Unit ${u.unit}: ${esc(u.title)}</option>`).join('');
  updateCategorySelect();
}

function updateCategorySelect() {
  const cSel = document.getElementById('categorySelect');
  const cats = getCategories(currentUnit);
  cSel.innerHTML = `<option value="all">All Categories</option>` + cats.map(c => `<option value="${c.id}">${esc(c.label)}</option>`).join('');
}

function loadCards() {
  currentUnit = document.getElementById('unitSelect').value;
  currentCategory = document.getElementById('categorySelect').value;
  allCards = flattenVocab(currentUnit, currentCategory);
  currentCards = allCards.slice();
  flippedSet.clear();
  updateCategorySelect();
  setMode(currentMode);
}

document.getElementById('unitSelect').addEventListener('change', loadCards);
document.getElementById('categorySelect').addEventListener('change', loadCards);
document.getElementById('shuffleBtn').addEventListener('click', () => { currentCards = shuffle(currentCards); flippedSet.clear(); setMode(currentMode); });
document.getElementById('resetBtn').addEventListener('click', () => { score = 0; streak = 0; loadCards(); });

// START
initSelects();
loadCards();
</script>
