<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vocabulary Station — THE PIT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg1: #fdf4ff;
  --bg2: #a855f7;
  --bg3: #581c87;
  --panel: #ffffff;
  --accent: #a855f7;
  --accent2: #c084fc;
  --text: #1f2937;
  --muted: #6b7280;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Orbitron', system-ui, sans-serif;
  background: radial-gradient(circle, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
}

header {
  background: var(--panel);
  border-radius: 20px;
  padding: 20px 30px;
  margin-bottom: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

h1 {
  margin: 0 0 10px 0;
  font-size: clamp(24px, 4vw, 36px);
  color: var(--bg3);
  letter-spacing: 2px;
}

.controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

select, button {
  padding: 12px 18px;
  border-radius: 12px;
  border: 2px solid var(--accent);
  font-family: inherit;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  background: white;
  color: var(--bg3);
}

button:hover {
  background: var(--accent);
  color: white;
}

.back-btn {
  background: var(--bg3);
  color: white;
  border-color: var(--bg3);
}

.back-btn:hover {
  background: #3b0764;
}

/* FLASHCARD GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* FLASHCARD STYLES */
.card {
  perspective: 1000px;
  height: 320px;
  cursor: pointer;
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  border-radius: 20px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.2);
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
}

/* FRONT OF CARD */
.card-front {
  background: linear-gradient(135deg, #ffffff 0%, #f5f3ff 100%);
  border: 3px solid var(--accent);
}

.card-icon {
  width: 80px;
  height: 80px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border-radius: 50%;
  padding: 16px;
}

.card-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: brightness(0) invert(1);
}

.card-icon .emoji {
  font-size: 42px;
  line-height: 1;
}

.card-word {
  font-size: 28px;
  font-weight: 900;
  color: var(--bg3);
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.card-pos {
  font-size: 12px;
  font-weight: 700;
  color: white;
  background: var(--accent);
  padding: 6px 16px;
  border-radius: 20px;
  text-transform: uppercase;
}

.card-hint {
  margin-top: 16px;
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}

/* BACK OF CARD */
.card-back {
  background: linear-gradient(135deg, var(--accent) 0%, var(--bg3) 100%);
  transform: rotateY(180deg);
  color: white;
}

.card-translation {
  font-size: 26px;
  font-weight: 900;
  margin-bottom: 16px;
  letter-spacing: 1px;
}

.card-category {
  font-size: 12px;
  font-weight: 700;
  background: rgba(255,255,255,0.2);
  padding: 8px 16px;
  border-radius: 20px;
  margin-bottom: 12px;
}

.card-unit {
  font-size: 14px;
  opacity: 0.9;
}

.card-back .card-hint {
  color: rgba(255,255,255,0.8);
}

/* HUD */
.hud {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.hud-item {
  background: var(--accent);
  color: white;
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
  .card {
    height: 300px;
  }
  .card-word {
    font-size: 24px;
  }
}
</style>
</head>

<body>

  </header>

</div>

// =====================
// ICON PATH HELPERS
// =====================

function getIconPath(setId, iconFile) {
  if (!iconFile) return null;
  
  // Determine category from setId
  let category = "activities";
  const id = setId.toLowerCase();
  
  if (id.includes("feel") || id.includes("personality")) {
    category = "emotions";
  } else if (id.includes("material")) {
    category = "materials";
  } else if (id.includes("job")) {
    category = "jobs";
  } else if (id.includes("body") || id.includes("fitness")) {
    category = "activities";
  }
  
  return `icons/${category}/${iconFile}`;
}

// =====================
// FLATTEN DATABASE
// =====================

function flattenVocab() {
  const cards = [];
  
  for (const unit of VOCAB_DB.units) {
    for (const set of unit.sets) {
      
      if (set.type === "pairs") {
        for (const pair of set.items) {
          // Card for first word
          cards.push({
            unit: unit.unit,
            unitTitle: unit.title,
            setLabel: set.label,
            front: pair.a,
            back: pair.b,
            pos: "verb",
            emoji: pair.emoji,
            icon: null
          });
        }
      }
      
      if (set.type === "words") {
        for (const item of set.items) {
          cards.push({
            unit: unit.unit,
            unitTitle: unit.title,
            setLabel: set.label,
            front: item.word,
            back: "",
            pos: getPOS(set.setId),
            emoji: item.emoji,
            icon: item.icon ? getIconPath(set.setId, item.icon) : null
          });
        }
      }
    }
  }
  
  return cards;
}

function getPOS(setId) {
  const id = setId.toLowerCase();
  if (id.includes("verb")) return "verb";
  if (id.includes("feel") || id.includes("personality")) return "adjective";
  if (id.includes("sense")) return "noun";
  return "noun";
}

function listUnits() {
  return VOCAB_DB.units.map(u => ({
    unit: u.unit,
    title: u.title
  }));
}

function shuffle(array) {
  const a = array.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// =====================
// APP STATE & DOM
// =====================

const grid = document.getElementById("grid");
const unitSelect = document.getElementById("unitSelect");
const shuffleBtn = document.getElementById("shuffleBtn");
const resetBtn = document.getElementById("resetBtn");
const cardCountEl = document.getElementById("cardCount");
const flippedCountEl = document.getElementById("flippedCount");

let allCards = [];
let currentCards = [];
let flippedSet = new Set();

// =====================
// INITIALIZE
// =====================

function initUnits() {
  const units = listUnits();
  unitSelect.innerHTML = `<option value="all">All Units</option>` +
    units.map(u => `<option value="${u.unit}">Unit ${u.unit}: ${u.title}</option>`).join("");
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// =====================
// RENDER CARDS
// =====================

function render() {
  grid.innerHTML = currentCards.map((card, idx) => {
    const isFlipped = flippedSet.has(idx);
    
    // Icon or emoji
    let iconHtml;
    if (card.icon) {
      iconHtml = `<img src="${escapeHtml(card.icon)}" alt="${escapeHtml(card.front)}" onerror="this.parentElement.innerHTML='<span class=\\'emoji\\'>${card.emoji || '📝'}</span>'">`;
    } else {
      iconHtml = `<span class="emoji">${card.emoji || '📝'}</span>`;
    }
    
    return `
    <div class="card ${isFlipped ? 'flipped' : ''}" data-index="${idx}" onclick="flipCard(${idx})">
      <div class="card-inner">
        
        <div class="card-face card-front">
          <div class="card-icon">${iconHtml}</div>
          <div class="card-word">${escapeHtml(card.front)}</div>
          <div class="card-pos">${escapeHtml(card.pos)}</div>
          <div class="card-hint">Click to flip</div>
        </div>
        
        <div class="card-face card-back">
          <div class="card-translation">${card.back ? escapeHtml(card.back) : escapeHtml(card.front)}</div>
          <div class="card-category">${escapeHtml(card.setLabel)}</div>
          <div class="card-unit">Unit ${card.unit}: ${escapeHtml(card.unitTitle)}</div>
          <div class="card-hint">Click to flip back</div>
        </div>
        
      </div>
    </div>
    `;
  }).join("");
  
  updateHUD();
}

function updateHUD() {
  cardCountEl.textContent = currentCards.length;
  flippedCountEl.textContent = flippedSet.size;
}

// =====================
// CARD INTERACTIONS
// =====================

window.flipCard = function(idx) {
  if (flippedSet.has(idx)) {
    flippedSet.delete(idx);
  } else {
    flippedSet.add(idx);
  }
  render();
};

// =====================
// CONTROLS
// =====================

function loadCards() {
  const unitVal = unitSelect.value;
  
  if (unitVal === "all") {
    currentCards = allCards.slice();
  } else {
    currentCards = allCards.filter(c => c.unit === Number(unitVal));
  }
  
  flippedSet.clear();
  render();
}

unitSelect.addEventListener("change", loadCards);

shuffleBtn.addEventListener("click", () => {
  currentCards = shuffle(currentCards);
  flippedSet.clear();
  render();
});

resetBtn.addEventListener("click", () => {
  flippedSet.clear();
  render();
});

// =====================
// INIT
// =====================

allCards = flattenVocab();
initUnits();
loadCards();

</script>
