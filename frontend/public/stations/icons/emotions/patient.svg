<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">

<!-- head -->
<circle cx="45" cy="40" r="10"
fill="#ffd6b3"
stroke="#333"
stroke-width="2"/>

<!-- eyes -->
<circle cx="42" cy="38" r="1.5" fill="#333"/>
<circle cx="48" cy="38" r="1.5" fill="#333"/>

<!-- calm smile -->
<path d="M41 42 Q45 45 49 42"
stroke="#333"
stroke-width="1.5"
fill="none"/>

<!-- body -->
<line x1="45" y1="50" x2="45" y2="80"
stroke="#333"
stroke-width="3"/>

<!-- legs -->
<line x1="45" y1="80" x2="30" y2="100"
stroke="#333"
stroke-width="3"/>

<line x1="45" y1="80" x2="60" y2="100"
stroke="#333"
stroke-width="3"/>

<!-- arms relaxed -->
<line x1="45" y1="60" x2="30" y2="70"
stroke="#333"
stroke-width="3"/>

<line x1="45" y1="60" x2="60" y2="70"
stroke="#333"
stroke-width="3"/>

<!-- chair -->
<rect x="25" y="70" width="40" height="8"
fill="#888"
stroke="#333"
stroke-width="2"/>

<line x1="25" y1="70" x2="25" y2="100"
stroke="#333"
stroke-width="3"/>

<line x1="65" y1="70" x2="65" y2="100"
stroke="#333"
stroke-width="3"/>

<!-- clock -->
<circle cx="90" cy="40" r="12"
fill="white"
stroke="#333"
stroke-width="2"/>

<line x1="90" y1="40" x2="90" y2="32"
stroke="#333"
stroke-width="2"/>

<line x1="90" y1="40" x2="97" y2="40"
stroke="#333"
stroke-width="2"/>

</svg>
