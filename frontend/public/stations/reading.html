<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Station - THE PIT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #ecfdf5;
  --bg2: #22c55e;
  --bg3: #14532d;
  --panel: #ffffff;
  --accent: #22c55e;
  --accent2: #4ade80;
  --text: #1f2937;
  --muted: #6b7280;
  --success: #16a34a;
  --error: #ef4444;
  --warning: #f59e0b;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: radial-gradient(ellipse at top, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
  min-height: 100vh;
  padding: 15px;
}

.container { max-width: 1400px; margin: 0 auto; }

header {
  background: var(--panel);
  border-radius: 16px;
  padding: 16px 24px;
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  margin: 0 0 12px 0;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(20px, 3vw, 28px);
  color: var(--bg3);
  letter-spacing: 2px;
}

.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}

select, button {
  padding: 8px 14px;
  border-radius: 10px;
  border: 2px solid var(--accent);
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  background: white;
  color: var(--bg3);
  transition: all 0.2s;
}

button:hover:not(:disabled) {
  background: var(--accent);
  color: white;
}

.back-btn {
  background: var(--bg3);
  color: white;
  border-color: var(--bg3);
}

.mode-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.mode-tab {
  padding: 10px 16px;
  border-radius: 10px;
  border: 2px solid #e5e7eb;
  background: white;
  color: var(--text);
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
}

.mode-tab:hover { border-color: var(--accent); background: #ecfdf5; }
.mode-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

.hud {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.hud-item {
  background: linear-gradient(135deg, var(--accent), var(--bg3));
  color: white;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
}

/* LOGIN */
.login-box {
  background: white;
  border-radius: 16px;
  padding: 30px;
  max-width: 400px;
  margin: 40px auto;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.login-box h2 { color: var(--bg3); margin-bottom: 20px; }
.login-box input {
  width: 100%;
  padding: 12px;
  border: 2px solid var(--accent);
  border-radius: 10px;
  font-size: 16px;
  margin-bottom: 16px;
}

.activity-screen { display: none; }
.activity-screen.active { display: block; }

/* READING LAYOUT */
.reading-layout {
  display: grid;
  grid-template-columns: 1fr 350px;
  gap: 16px;
}

@media (max-width: 900px) {
  .reading-layout { grid-template-columns: 1fr; }
}

/* TEXT PANEL */
.text-panel {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.text-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid #e5e7eb;
}

.text-title {
  font-weight: 800;
  font-size: 18px;
  color: var(--bg3);
}

.text-meta {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
}

.text-content {
  background: #f0fdf4;
  border: 2px solid var(--accent2);
  border-radius: 12px;
  padding: 20px;
  font-size: 15px;
  line-height: 1.8;
  max-height: 400px;
  overflow-y: auto;
}

.text-content p { margin: 0 0 16px 0; }
.text-content p:last-child { margin-bottom: 0; }

.highlight { background: #bbf7d0; padding: 2px 4px; border-radius: 4px; }

/* QUESTION PANEL */
.question-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.question-card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

.question-card h3 {
  margin: 0 0 12px 0;
  font-size: 14px;
  color: var(--bg3);
}

.question-text {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.4;
}

.options { display: flex; flex-direction: column; gap: 8px; }

.option-btn {
  width: 100%;
  padding: 12px 14px;
  background: white;
  border: 2px solid #e5e7eb;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: #ecfdf5;
}

.option-btn.correct {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.option-btn.wrong {
  background: var(--error);
  border-color: var(--error);
  color: white;
}

.option-btn:disabled { cursor: not-allowed; opacity: 0.7; }

/* PROGRESS */
.progress-bar {
  height: 8px;
  background: #e5e7eb;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 12px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 8px;
  transition: width 0.3s;
}

/* STATS CARD */
.stats-card {
  background: #ecfdf5;
  border: 2px solid var(--accent2);
  border-radius: 12px;
  padding: 14px;
}

.stats-card h4 {
  margin: 0 0 10px 0;
  font-size: 13px;
  color: var(--bg3);
}

.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin: 6px 0;
}

.stat-row span:last-child {
  font-weight: 700;
  color: var(--accent);
}

/* VOCABULARY BOX */
.vocab-box {
  background: white;
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

.vocab-box h4 {
  margin: 0 0 10px 0;
  font-size: 13px;
  color: var(--bg3);
}

.vocab-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.vocab-word {
  padding: 4px 10px;
  background: #ecfdf5;
  border: 1px solid var(--accent2);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}

/* FEEDBACK */
.feedback {
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  margin-top: 12px;
}

.feedback.success { background: #dcfce7; color: #166534; }
.feedback.error { background: #fee2e2; color: #991b1b; }

/* COMPLETE MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active { display: flex; }

.modal-content {
  background: white;
  border-radius: 20px;
  padding: 32px;
  text-align: center;
  max-width: 400px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}

.modal-icon { font-size: 50px; margin-bottom: 16px; }
.modal-title { font-size: 24px; font-weight: 800; color: var(--bg3); margin-bottom: 8px; }
.modal-score { font-size: 40px; font-weight: 800; color: var(--accent); margin-bottom: 16px; }
.modal-btn {
  padding: 12px 24px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  margin: 4px;
}

</style>
</head>
<body>

<div class="container">
  <!-- LOGIN -->
  <div id="login-screen" class="activity-screen active">
    <div class="login-box">
      <h2>READING STATION</h2>
      <p>Enter your name:</p>
      <input type="text" id="nameInput" placeholder="Your name">
      <button onclick="startApp()">START READING</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-screen" class="activity-screen">
    <header>
      <h1>READING STATION</h1>
      
      <div class="controls">
        <button class="back-btn" onclick="location.href='../index.html'">MENU</button>
        <select id="unitSelect"><option value="all">All Units</option></select>
        <select id="levelSelect">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <button onclick="loadNewText()">New Text</button>
        <button onclick="toggleTimer()" id="timerBtn">Pause</button>
      </div>
      
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="comprehension">Comprehension</button>
        <button class="mode-tab" data-mode="vocabulary">Vocabulary</button>
        <button class="mode-tab" data-mode="truefalse">True/False</button>
        <button class="mode-tab" data-mode="summary">Summary</button>
      </div>
      
      <div class="hud">
        <div class="hud-item">Reader: <span id="playerName">-</span></div>
        <div class="hud-item">Time: <span id="timer">00:00</span></div>
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Streak: <span id="streak">0</span></div>
        <div class="hud-item">Texts: <span id="textsRead">0</span></div>
      </div>
    </header>

    <div class="reading-layout">
      <div class="text-panel">
        <div class="text-header">
          <div class="text-title" id="textTitle">-</div>
          <div class="text-meta" id="textMeta">-</div>
        </div>
        <div class="text-content" id="textContent">Select a text to begin reading.</div>
      </div>

      <div class="question-panel">
        <div class="question-card">
          <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
          <h3>Question <span id="questionNum">1</span>/<span id="totalQuestions">5</span></h3>
          <div class="question-text" id="questionText">-</div>
          <div class="options" id="optionsBox"></div>
          <div id="feedback" class="feedback" style="display:none"></div>
        </div>

        <div class="stats-card">
          <h4>Session Stats</h4>
          <div class="stat-row"><span>Correct Answers</span><span id="correctCount">0</span></div>
          <div class="stat-row"><span>Best Streak</span><span id="bestStreak">0</span></div>
          <div class="stat-row"><span>Points Earned</span><span id="pointsEarned">0</span></div>
        </div>

        <div class="vocab-box">
          <h4>Key Vocabulary</h4>
          <div class="vocab-list" id="vocabList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="completeModal">
  <div class="modal-content">
    <div class="modal-icon">&#128214;</div>
    <div class="modal-title">Text Complete!</div>
    <div class="modal-score" id="finalScore">0/5</div>
    <p id="modalMessage">Great reading!</p>
    <button class="modal-btn" onclick="loadNewText()">Next Text</button>
    <button class="modal-btn" onclick="closeModal()" style="background:#6b7280">Close</button>
  </div>
</div>

<script src="pit-score.js"></script>
<script>
// READING TEXTS - Aligned with 2ESO curriculum
const TEXTS = [
  // UNIT 1: Then and Now
  {
    id: 'u1_easy', unit: 1, level: 'easy',
    title: 'Life in the Past',
    content: `<p>My grandmother often tells me stories about life when she was young. Things were very different then. There was no internet, no mobile phones, and no social media. People sent letters to communicate with friends and family who lived far away.</p>
    <p>She remembers being very excited when her family bought their first television. It was black and white, and there were only two channels! Children played outside more often. They didn't have video games, so they invented their own games.</p>
    <p>Some things were harder in the past. People couldn't save information on computers. They had to remember everything or write it down. But my grandmother says people were happier because they spent more time together.</p>`,
    vocabulary: ['communicate', 'excited', 'remember', 'invented', 'save'],
    questions: [
      { q: 'How did people communicate in the past?', options: ['By sending letters', 'By video call', 'By text message', 'By email'], answer: 0 },
      { q: 'What was special about the first TV?', options: ['It was black and white', 'It had many channels', 'It was very big', 'It was in colour'], answer: 0 },
      { q: 'Why did children play outside more?', options: ['They had no video games', 'It was warmer', 'Schools were closed', 'Parents made them'], answer: 0 },
      { q: 'What does the grandmother think about the past?', options: ['People were happier', 'Life was terrible', 'Everything was worse', 'Nothing was different'], answer: 0 },
      { q: 'What couldn\'t people do without computers?', options: ['Save information easily', 'Talk to each other', 'Go to school', 'Watch television'], answer: 0 }
    ],
    trueFalse: [
      { statement: 'People used mobile phones in the past.', answer: false },
      { statement: 'The first television was black and white.', answer: true },
      { statement: 'Children played more video games in the past.', answer: false },
      { statement: 'The grandmother thinks people spent more time together.', answer: true }
    ]
  },
  // UNIT 2: Art and Design
  {
    id: 'u2_easy', unit: 2, level: 'easy',
    title: 'Street Art Around the World',
    content: `<p>Street art has become very popular in cities around the world. Artists paint murals on buildings, walls, and even pavements. Some people think it's vandalism, but many believe it's a form of art that makes cities more beautiful.</p>
    <p>Famous street artists like Banksy create paintings that make people think about social issues. His work often appears suddenly on walls in different countries. Nobody knows his real identity!</p>
    <p>In some cities, there are special areas where artists can paint legally. These outdoor galleries attract tourists and help local artists become famous. The materials street artists use include spray paint, brushes, and stencils.</p>`,
    vocabulary: ['murals', 'vandalism', 'identity', 'attract', 'materials'],
    questions: [
      { q: 'Where do street artists paint?', options: ['On buildings and walls', 'Only in museums', 'Just on paper', 'In private homes'], answer: 0 },
      { q: 'What do some people think about street art?', options: ['It\'s vandalism', 'It\'s always illegal', 'It\'s boring', 'It\'s too expensive'], answer: 0 },
      { q: 'What is special about Banksy?', options: ['Nobody knows who he is', 'He only paints in England', 'He uses oil paints', 'He works for the government'], answer: 0 },
      { q: 'Why do cities create special areas for street art?', options: ['To attract tourists', 'To hide ugly buildings', 'To save money', 'To keep artists away'], answer: 0 },
      { q: 'What materials do street artists use?', options: ['Spray paint and stencils', 'Only pencils', 'Watercolours', 'Clay'], answer: 0 }
    ],
    trueFalse: [
      { statement: 'Street art is always illegal.', answer: false },
      { statement: 'Banksy\'s real identity is known.', answer: false },
      { statement: 'Some cities have legal areas for street art.', answer: true },
      { statement: 'Street artists only use spray paint.', answer: false }
    ]
  },
  // UNIT 3: Fresh Air
  {
    id: 'u3_easy', unit: 3, level: 'easy',
    title: 'The Benefits of Outdoor Activities',
    content: `<p>Spending time outdoors is good for your physical and mental health. Activities like hiking, cycling, and swimming help keep your body fit and strong. Exercise releases chemicals in your brain that make you feel happy.</p>
    <p>Nature has a calming effect on people. Scientists have found that spending just 20 minutes in a park can reduce stress. The fresh air and green spaces help us relax and think more clearly.</p>
    <p>Outdoor activities are also great for making friends. Joining a sports team or a hiking club connects you with people who share your interests. Many people say their best memories are from adventures in nature.</p>`,
    vocabulary: ['physical', 'mental', 'releases', 'reduce', 'adventures'],
    questions: [
      { q: 'What do outdoor activities help with?', options: ['Physical and mental health', 'Only physical health', 'Only mental health', 'Nothing at all'], answer: 0 },
      { q: 'What happens in your brain during exercise?', options: ['Happy chemicals are released', 'You get tired', 'Nothing changes', 'You feel sad'], answer: 0 },
      { q: 'How long in a park can reduce stress?', options: ['20 minutes', '2 hours', '5 minutes', '1 day'], answer: 0 },
      { q: 'How can outdoor activities help you make friends?', options: ['By joining clubs or teams', 'By staying home', 'By watching TV', 'By reading books'], answer: 0 },
      { q: 'What do many people say about nature adventures?', options: ['They are their best memories', 'They are boring', 'They are dangerous', 'They are expensive'], answer: 0 }
    ],
    trueFalse: [
      { statement: 'Outdoor activities only help physical health.', answer: false },
      { statement: 'Nature can help reduce stress.', answer: true },
      { statement: 'You can make friends through outdoor activities.', answer: true },
      { statement: 'Exercise makes you feel sad.', answer: false }
    ]
  },
  // UNIT 4: A Helping Hand
  {
    id: 'u4_easy', unit: 4, level: 'easy',
    title: 'Young Volunteers Making a Difference',
    content: `<p>Volunteering means helping others without expecting payment. Many young people around the world are volunteering in their communities. They help at animal shelters, visit elderly people, and clean up local parks.</p>
    <p>Emma, 14, volunteers at a food bank every Saturday. "I pack boxes of food for families who need help," she explains. "It makes me feel good to know I'm making a difference."</p>
    <p>Schools often encourage students to volunteer. It teaches important life skills like teamwork, responsibility, and communication. Volunteering also looks good on university applications and helps students discover their interests.</p>`,
    vocabulary: ['volunteering', 'communities', 'encourage', 'responsibility', 'discover'],
    questions: [
      { q: 'What is volunteering?', options: ['Helping without payment', 'Working for money', 'Studying at school', 'Playing sports'], answer: 0 },
      { q: 'Where does Emma volunteer?', options: ['At a food bank', 'At a hospital', 'At a school', 'At a shop'], answer: 0 },
      { q: 'What skills does volunteering teach?', options: ['Teamwork and responsibility', 'Only cooking', 'Only reading', 'Nothing useful'], answer: 0 },
      { q: 'Why is volunteering good for university applications?', options: ['It looks good', 'It doesn\'t help', 'Universities don\'t care', 'It wastes time'], answer: 0 },
      { q: 'How does Emma feel about volunteering?', options: ['Good about making a difference', 'Bored and tired', 'Angry and frustrated', 'Indifferent'], answer: 0 }
    ],
    trueFalse: [
      { statement: 'Volunteers expect to be paid.', answer: false },
      { statement: 'Emma volunteers at a food bank.', answer: true },
      { statement: 'Volunteering teaches life skills.', answer: true },
      { statement: 'Schools never encourage volunteering.', answer: false }
    ]
  },
  // UNIT 5: Let's Play
  {
    id: 'u5_easy', unit: 5, level: 'easy',
    title: 'Board Games vs Video Games',
    content: `<p>Both board games and video games are popular forms of entertainment. Board games have been around for thousands of years, while video games are a modern invention. Each type has its own advantages.</p>
    <p>Board games bring people together face to face. Players can see each other's expressions and reactions. Games like chess develop strategic thinking, while party games create laughter and fun memories.</p>
    <p>Video games can improve hand-eye coordination and problem-solving skills. Many games now allow players to connect online with friends around the world. However, experts recommend limiting screen time and balancing gaming with other activities.</p>`,
    vocabulary: ['entertainment', 'advantages', 'expressions', 'strategic', 'coordination'],
    questions: [
      { q: 'Which type of game is older?', options: ['Board games', 'Video games', 'They are the same age', 'Card games'], answer: 0 },
      { q: 'What do board games allow players to do?', options: ['See each other\'s expressions', 'Play alone', 'Connect online', 'Watch movies'], answer: 0 },
      { q: 'What skill does chess develop?', options: ['Strategic thinking', 'Running speed', 'Cooking ability', 'Drawing skills'], answer: 0 },
      { q: 'What can video games improve?', options: ['Hand-eye coordination', 'Nothing', 'Physical strength only', 'Sleep quality'], answer: 0 },
      { q: 'What do experts recommend about gaming?', options: ['Limit screen time', 'Play all day', 'Never play games', 'Only play video games'], answer: 0 }
    ],
    trueFalse: [
      { statement: 'Video games are older than board games.', answer: false },
      { statement: 'Board games bring people together face to face.', answer: true },
      { statement: 'Video games can improve problem-solving skills.', answer: true },
      { statement: 'Experts say screen time doesn\'t matter.', answer: false }
    ]
  },
  // UNIT 6: Move It!
  {
    id: 'u6_easy', unit: 6, level: 'easy',
    title: 'Staying Healthy as a Teenager',
    content: `<p>Being healthy involves taking care of your body and mind. Regular exercise keeps your muscles strong and your heart healthy. Experts recommend that teenagers get at least 60 minutes of physical activity every day.</p>
    <p>Eating well is equally important. A balanced diet includes fruits, vegetables, proteins, and whole grains. Drinking water helps your body function properly. Try to limit sugary drinks and processed foods.</p>
    <p>Sleep is often forgotten, but it's essential for teenagers. During sleep, your body repairs itself and your brain processes what you learned during the day. Aim for 8-10 hours of sleep each night.</p>`,
    vocabulary: ['involves', 'recommend', 'balanced', 'function', 'essential'],
    questions: [
      { q: 'How much exercise should teenagers get daily?', options: ['At least 60 minutes', '10 minutes', '5 hours', 'No exercise needed'], answer: 0 },
      { q: 'What does a balanced diet include?', options: ['Fruits, vegetables, proteins', 'Only pizza', 'Just sweets', 'Only meat'], answer: 0 },
      { q: 'Why is water important?', options: ['It helps the body function', 'It tastes good', 'It\'s not important', 'It helps you sleep'], answer: 0 },
      { q: 'What happens during sleep?', options: ['Body repairs and brain processes', 'Nothing important', 'You get weaker', 'You forget everything'], answer: 0 },
      { q: 'How many hours of sleep should teenagers get?', options: ['8-10 hours', '4-5 hours', '12-14 hours', '2-3 hours'], answer: 0 }
    ],
    trueFalse: [
      { statement: 'Teenagers need at least 60 minutes of exercise daily.', answer: true },
      { statement: 'A balanced diet includes only proteins.', answer: false },
      { statement: 'Sleep is not important for teenagers.', answer: false },
      { statement: 'The body repairs itself during sleep.', answer: true }
    ]
  },
  // UNIT 7: Skills for Life
  {
    id: 'u7_easy', unit: 7, level: 'easy',
    title: 'Learning to Cook: A Life Skill',
    content: `<p>Cooking is one of the most important life skills you can learn. When you know how to cook, you can prepare healthy meals for yourself and others. It also saves money compared to eating out or buying ready meals.</p>
    <p>Start with simple recipes. First, read all the instructions carefully. Then, prepare your ingredients before you begin. This is called "mise en place" in French, which means "everything in its place."</p>
    <p>Don't be afraid to make mistakes. Every good cook has burnt food or added too much salt at some point. Learning from errors is part of the process. With practice, you'll become more confident in the kitchen.</p>`,
    vocabulary: ['prepare', 'instructions', 'ingredients', 'mistakes', 'confident'],
    questions: [
      { q: 'Why is cooking an important skill?', options: ['You can prepare healthy meals', 'It\'s not important', 'Only chefs need it', 'It wastes time'], answer: 0 },
      { q: 'What should you do first with a recipe?', options: ['Read the instructions', 'Start cooking immediately', 'Buy expensive tools', 'Call a friend'], answer: 0 },
      { q: 'What does "mise en place" mean?', options: ['Everything in its place', 'Start cooking', 'Clean the kitchen', 'Eat quickly'], answer: 0 },
      { q: 'What should you do when you make mistakes?', options: ['Learn from them', 'Stop cooking forever', 'Get angry', 'Blame others'], answer: 0 },
      { q: 'What happens with practice?', options: ['You become more confident', 'Nothing changes', 'You get worse', 'You forget everything'], answer: 0 }
    ],
    trueFalse: [
      { statement: 'Cooking can save money.', answer: true },
      { statement: 'You should start cooking before reading the recipe.', answer: false },
      { statement: 'Good cooks never make mistakes.', answer: false },
      { statement: 'Practice helps you become confident.', answer: true }
    ]
  },
  // UNIT 8: What a Year!
  {
    id: 'u8_easy', unit: 8, level: 'easy',
    title: 'Planning Your Summer Holiday',
    content: `<p>Summer holidays are a great time to relax, travel, and try new things. Planning ahead can help you make the most of your free time. Start by thinking about what you want to do and who you want to spend time with.</p>
    <p>If you're travelling with family, discuss everyone's preferences. Some people love beaches, while others prefer mountains or cities. Finding activities everyone enjoys makes the trip more fun.</p>
    <p>Even if you're staying home, you can have a great summer. Visit local attractions, learn a new skill, or volunteer in your community. The most important thing is to create memories you'll remember for years.</p>`,
    vocabulary: ['relax', 'planning', 'preferences', 'attractions', 'memories'],
    questions: [
      { q: 'What helps you make the most of summer?', options: ['Planning ahead', 'Doing nothing', 'Staying in bed', 'Ignoring everything'], answer: 0 },
      { q: 'What should families discuss when travelling?', options: ['Everyone\'s preferences', 'Nothing important', 'Only the parents\' ideas', 'The weather'], answer: 0 },
      { q: 'Can you have a good summer without travelling?', options: ['Yes, by doing local activities', 'No, you must travel', 'No, summer will be boring', 'Only with money'], answer: 0 },
      { q: 'What is the most important thing about summer?', options: ['Creating memories', 'Spending money', 'Working hard', 'Watching TV'], answer: 0 },
      { q: 'What can you do at home during summer?', options: ['Learn new skills', 'Nothing interesting', 'Only sleep', 'Just homework'], answer: 0 }
    ],
    trueFalse: [
      { statement: 'Planning helps make the most of summer.', answer: true },
      { statement: 'You must travel to have a good summer.', answer: false },

      { statement: 'The only good summer activity is going to the beach.', answer: false }
    ]
  }
];

// STATE
let playerName = '';
let currentText = null;
let currentMode = 'comprehension';
let currentUnit = 'all';
let currentLevel = 'easy';
let questionIndex = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let correctCount = 0;
let textsRead = 0;
let timerSeconds = 0;
let timerInterval = null;
let isPaused = false;

// DOM
const loginScreen = document.getElementById('login-screen');
const mainScreen = document.getElementById('main-screen');

// INIT
function init() {
  // Check for saved player
  if (typeof PIT_SCORE !== 'undefined') {
    const player = PIT_SCORE.getPlayer();
    if (player.name) {
      playerName = player.name;
      textsRead = player.stations.reading.textsRead || 0;
      score = player.stations.reading.score || 0;
    }
  }
  
  initUnitSelect();
  initModeTabs();
  
  if (playerName) {
    startApp();
  }
}

function initUnitSelect() {
  const select = document.getElementById('unitSelect');
  select.innerHTML = '<option value="all">All Units</option>';
  for (let i = 1; i <= 8; i++) {
    select.innerHTML += `<option value="${i}">Unit ${i}</option>`;
  }
  select.addEventListener('change', e => { currentUnit = e.target.value; loadNewText(); });
  document.getElementById('levelSelect').addEventListener('change', e => { currentLevel = e.target.value; loadNewText(); });
}

function initModeTabs() {
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentMode = tab.dataset.mode;
      questionIndex = 0;
      loadQuestion();
    });
  });
}

function startApp() {
  const input = document.getElementById('nameInput');
  if (!playerName && input) {
    playerName = input.value.trim();
    if (!playerName) { alert('Enter your name'); return; }
    
    if (typeof PIT_SCORE !== 'undefined') {
      PIT_SCORE.setName(playerName);
    }
  }
  
  loginScreen.classList.remove('active');
  mainScreen.classList.add('active');
  document.getElementById('playerName').textContent = playerName;
  
  loadNewText();
  startTimer();
}

// TIMER
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    if (!isPaused) {
      timerSeconds++;
      const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
      const s = String(timerSeconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }
  }, 1000);
}

function toggleTimer() {
  isPaused = !isPaused;
  document.getElementById('timerBtn').textContent = isPaused ? 'Resume' : 'Pause';
}

// LOAD TEXT
function loadNewText() {
  let filtered = TEXTS.filter(t => t.level === currentLevel);
  if (currentUnit !== 'all') {
    filtered = filtered.filter(t => t.unit === parseInt(currentUnit));
  }
  
  if (filtered.length === 0) {
    filtered = TEXTS.filter(t => t.level === currentLevel);
  }
  
  currentText = filtered[Math.floor(Math.random() * filtered.length)];
  questionIndex = 0;
  
  document.getElementById('textTitle').textContent = currentText.title;
  document.getElementById('textMeta').textContent = `Unit ${currentText.unit} • ${currentText.level.toUpperCase()}`;
  document.getElementById('textContent').innerHTML = currentText.content;
  
  // Vocabulary
  document.getElementById('vocabList').innerHTML = currentText.vocabulary.map(w => 
    `<span class="vocab-word">${w}</span>`
  ).join('');
  
  loadQuestion();
  updateStats();
}

// LOAD QUESTION
function loadQuestion() {
  const questions = getQuestions();
  
  if (questionIndex >= questions.length) {
    showComplete();
    return;
  }
  
  const q = questions[questionIndex];
  document.getElementById('questionNum').textContent = questionIndex + 1;
  document.getElementById('totalQuestions').textContent = questions.length;
  document.getElementById('progressBar').style.width = `${(questionIndex / questions.length) * 100}%`;
  document.getElementById('feedback').style.display = 'none';
  
  if (currentMode === 'truefalse') {
    document.getElementById('questionText').textContent = q.statement;
    document.getElementById('optionsBox').innerHTML = `
      <button class="option-btn" onclick="answerTF(true)">True</button>
      <button class="option-btn" onclick="answerTF(false)">False</button>
    `;
  } else if (currentMode === 'summary') {
    document.getElementById('questionText').textContent = 'Summarize the main idea:';
    document.getElementById('optionsBox').innerHTML = `
      <textarea id="summaryInput" style="width:100%;height:80px;border:2px solid #22c55e;border-radius:8px;padding:10px;font-family:inherit;"></textarea>
      <button class="option-btn" onclick="checkSummary()" style="margin-top:8px;background:#22c55e;color:white;border-color:#22c55e;">Submit Summary</button>
    `;
  } else {
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('optionsBox').innerHTML = q.options.map((opt, i) => 
      `<button class="option-btn" onclick="answer(${i}, ${q.answer})">${opt}</button>`
    ).join('');
  }
}

function getQuestions() {
  if (currentMode === 'truefalse') return currentText.trueFalse;
  if (currentMode === 'summary') return [{ type: 'summary' }];
  return currentText.questions; // comprehension or vocabulary
}

// ANSWER
window.answer = function(selected, correct) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    if (i === selected && selected !== correct) btn.classList.add('wrong');
  });
  
  const isCorrect = selected === correct;
  handleAnswer(isCorrect);
};

window.answerTF = function(selected) {
  const q = currentText.trueFalse[questionIndex];
  const isCorrect = selected === q.answer;
  
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const btnValue = btn.textContent === 'True';
    if (btnValue === q.answer) btn.classList.add('correct');
    if (btnValue === selected && !isCorrect) btn.classList.add('wrong');
  });
  
  handleAnswer(isCorrect);
};

window.checkSummary = function() {
  const input = document.getElementById('summaryInput').value.trim();
  if (input.length < 20) {
    showFeedback('Write at least 20 characters.', false);
    return;
  }
  
  // Simple check - has key words
  const keywords = currentText.vocabulary.slice(0, 3);
  const hasKeywords = keywords.some(kw => input.toLowerCase().includes(kw.toLowerCase()));
  
  handleAnswer(true); // Give points for attempting
  score += hasKeywords ? 10 : 5;
  showFeedback(hasKeywords ? 'Great summary! +10 bonus' : 'Good effort! +5', true);
};

function handleAnswer(isCorrect) {
  const fb = document.getElementById('feedback');
  
  if (isCorrect) {
    score += 10;
    streak++;
    correctCount++;
    if (streak > bestStreak) bestStreak = streak;
    fb.textContent = 'Correct! +10 points';
    fb.className = 'feedback success';
  } else {
    streak = 0;
    fb.textContent = 'Incorrect. Keep trying!';
    fb.className = 'feedback error';
  }
  
  fb.style.display = 'block';
  updateStats();
  
  setTimeout(() => {
    questionIndex++;
    loadQuestion();
  }, 1200);
}

function showFeedback(text, success) {
  const fb = document.getElementById('feedback');
  fb.textContent = text;
  fb.className = success ? 'feedback success' : 'feedback error';
  fb.style.display = 'block';
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
  document.getElementById('textsRead').textContent = textsRead;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('bestStreak').textContent = bestStreak;
  document.getElementById('pointsEarned').textContent = score;
}

// COMPLETE
function showComplete() {
  textsRead++;
  
  // Save to global score
  if (typeof PIT_SCORE !== 'undefined') {
    PIT_SCORE.addScore('reading', score);
    PIT_SCORE.updateStation('reading', { textsRead, bestStreak });
  }
  
  const questions = getQuestions();
  document.getElementById('finalScore').textContent = `${correctCount}/${questions.length}`;
  
  const pct = (correctCount / questions.length) * 100;
  let msg = 'Keep practicing!';
  if (pct >= 80) msg = 'Excellent reading comprehension!';
  else if (pct >= 60) msg = 'Good job! Keep improving!';
  
  document.getElementById('modalMessage').textContent = msg;
  document.getElementById('completeModal').classList.add('active');
  
  updateStats();
}

function closeModal() {
  document.getElementById('completeModal').classList.remove('active');
}

// START
init();
</script>
</body>
</html>
