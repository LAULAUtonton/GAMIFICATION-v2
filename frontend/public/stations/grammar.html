<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Station - THE PIT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg1:#f3f4f6;--bg2:#6b7280;--bg3:#1f2937;--panel:#fff;--accent:#6b7280;--accent2:#9ca3af;--text:#1f2937;--muted:#6b7280;--success:#16a34a;--error:#ef4444}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:radial-gradient(ellipse at top,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);min-height:100vh;padding:15px}
.container{max-width:900px;margin:0 auto}
header{background:var(--panel);border-radius:16px;padding:16px 24px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
h1{margin:0 0 12px;font-family:'Orbitron',sans-serif;font-size:clamp(20px,3vw,28px);color:var(--bg3);letter-spacing:2px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
select,button{padding:8px 14px;border-radius:10px;border:2px solid var(--accent);font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;background:#fff;color:var(--bg3);transition:all .2s}
button:hover:not(:disabled){background:var(--accent);color:#fff}
.back-btn{background:var(--bg3);color:#fff;border-color:var(--bg3)}
.hud{display:flex;gap:10px;flex-wrap:wrap}
.hud-item{background:linear-gradient(135deg,var(--accent),var(--bg3));color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700}
.login-box{background:#fff;border-radius:20px;padding:36px 30px;max-width:460px;margin:30px auto;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,.2)}
.login-box h2{color:var(--bg3);margin-bottom:8px;font-family:'Orbitron',sans-serif;font-size:22px}
.login-box .sub{color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.5}
.login-box input{width:100%;padding:12px;border:2px solid var(--accent);border-radius:10px;font-size:16px;margin-bottom:16px}
.screen{display:none}.screen.active{display:block}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.topic-card{background:var(--panel);border:2px solid #e5e7eb;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;text-align:center}
.topic-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.1)}
.topic-card.active{border-color:var(--accent);background:#f3f4f6}
.topic-card h3{font-size:15px;color:var(--bg3);margin:0 0 4px}
.topic-card p{font-size:11px;color:var(--muted);margin:0}
.main-panel{background:#fff;border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.15);margin-bottom:16px}
.q-card{background:#f3f4f6;border:2px solid #e5e7eb;border-radius:14px;padding:20px;text-align:center;margin-bottom:16px}
.q-num{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px}
.q-text{font-size:18px;font-weight:700;color:var(--bg3);line-height:1.5}
.options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px}
.opt{padding:12px 24px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;min-width:120px}
.opt:hover{border-color:var(--accent);background:#f3f4f6}
.opt.correct{background:#dcfce7;border-color:var(--success);color:#166534}
.opt.wrong{background:#fee2e2;border-color:var(--error);color:#991b1b}
.fb{padding:12px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:8px;text-align:center}
.fb.ok{background:#dcfce7;color:#166534}.fb.bad{background:#fee2e2;color:#991b1b}.fb.info{background:#f3f4f6;color:#4b5563}
.explanation{background:#eff6ff;border:2px solid #bfdbfe;border-radius:10px;padding:12px;font-size:13px;line-height:1.6;color:#1e40af;margin-bottom:12px;display:none}
.pbar{height:8px;background:#e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:12px}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:8px;transition:width .3s}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:32px;text-align:center;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.modal-title{font-size:24px;font-weight:800;color:var(--bg3);margin-bottom:8px}
.modal-score{font-size:40px;font-weight:800;color:var(--accent);margin-bottom:16px}
.modal-btn{padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin:4px}
</style>
</head>
<body>
<div class="container">
<div id="login" class="screen active">
<div class="login-box">
  <h2 data-testid="grammar-title">GRAMMAR STATION</h2>
  <p class="sub">Master English grammar with interactive exercises! Choose a topic and practice.</p>
  <input type="text" id="nameInput" data-testid="name-input" placeholder="Your name" onkeydown="if(event.key==='Enter')startApp()">
  <button data-testid="start-btn" onclick="startApp()" style="width:100%;padding:14px;font-size:16px">START GRAMMAR</button>
</div>
</div>
<div id="main" class="screen">
<header>
  <h1>GRAMMAR STATION</h1>
  <div class="controls">
    <button class="back-btn" data-testid="menu-btn" onclick="location.href='../index.html'">MENU</button>
    <button data-testid="topics-btn" onclick="showTopics()">Choose Topic</button>
  </div>
  <div class="hud">
    <div class="hud-item">Player: <span id="pName" data-testid="player-name">-</span></div>
    <div class="hud-item">Score: <span id="hScore" data-testid="score-display">0</span></div>
    <div class="hud-item">Streak: <span id="hStreak" data-testid="streak-display">0</span></div>
    <div class="hud-item">Topic: <span id="hTopic" data-testid="topic-display">-</span></div>
  </div>
</header>
<div id="topicsView">
  <div class="topics-grid" id="topicsGrid" data-testid="topics-grid"></div>
</div>
<div id="quizView" style="display:none">
  <div class="main-panel">
    <div class="pbar"><div class="pfill" id="progBar" data-testid="progress-bar"></div></div>
    <div class="q-card">
      <div class="q-num" id="qNum" data-testid="q-num">1 / 10</div>
      <div class="q-text" id="qText" data-testid="q-text">Loading...</div>
    </div>
    <div class="options" id="qOpts" data-testid="q-options"></div>
    <div class="explanation" id="explain" data-testid="explanation"></div>
    <div class="fb info" id="qFb" data-testid="q-feedback">Choose the correct answer.</div>
  </div>
</div>
</div>
</div>
<div class="modal" id="doneModal">
<div class="modal-box">
  <div class="modal-title">Topic Complete!</div>
  <div class="modal-score" id="finalScore" data-testid="final-score">0</div>
  <p id="modalMsg"></p>
  <button class="modal-btn" onclick="showTopics()">Choose Another</button>
  <button class="modal-btn" onclick="closeModal()" style="background:#6b7280">Close</button>
</div>
</div>
<script src="pit-score.js"></script>
<script>
const TOPICS=[
{name:'To Be',desc:'am, is, are, was, were',color:'#3b82f6',questions:[
  {q:'There ______ a cat in the garden.',opts:['is','are'],ans:'is',tip:'Use "is" with singular nouns (a cat = one cat).'},
  {q:'There ______ two books on the table.',opts:['is','are'],ans:'are',tip:'"Two books" is plural, so use "are".'},
  {q:'Yesterday, there ______ a big storm.',opts:['was','were'],ans:'was',tip:'"A big storm" is singular + past = "was".'},
  {q:'There ______ many students in the classroom yesterday.',opts:['was','were'],ans:'were',tip:'"Many students" is plural + past = "were".'},
  {q:'He ______ very happy today.',opts:['is','are'],ans:'is',tip:'"He" is singular = "is".'},
  {q:'They ______ at home last night.',opts:['was','were'],ans:'were',tip:'"They" is plural + past = "were".'},
  {q:'I ______ a student.',opts:['am','is'],ans:'am',tip:'With "I" always use "am".'},
  {q:'We ______ friends since primary school.',opts:['are','is'],ans:'are',tip:'"We" is plural = "are".'},
  {q:'The weather ______ terrible yesterday.',opts:['was','were'],ans:'was',tip:'"The weather" is singular + past = "was".'},
  {q:'______ you at the party last Saturday?',opts:['Was','Were'],ans:'Were',tip:'With "you" always use "were" in past.'}
]},
{name:'Pronouns',desc:'Subject & Object pronouns',color:'#8b5cf6',questions:[
  {q:'My brother is very funny. ______ always makes me laugh.',opts:['He','Him'],ans:'He',tip:'"He" is a subject pronoun (does the action).'},
  {q:'I have a new bike. Do you want to see ______?',opts:['it','she'],ans:'it',tip:'"It" replaces "a new bike" (object pronoun).'},
  {q:'This is my friend Ana. Do you know ______?',opts:['her','she'],ans:'her',tip:'"Her" is an object pronoun (after a verb).'},
  {q:'My parents are teachers. I love ______ very much.',opts:['them','they'],ans:'them',tip:'"Them" is the object form of "they".'},
  {q:'We are going to the cinema. Do you want to come with ______?',opts:['us','we'],ans:'us',tip:'"Us" is the object form of "we" (after a preposition).'},
  {q:'This is my dog. ______ is very cute.',opts:['It','Its'],ans:'It',tip:'"It" is a subject pronoun. "Its" is possessive.'},
  {q:'Can you help ______? I don\'t understand this.',opts:['me','I'],ans:'me',tip:'"Me" is an object pronoun (after a verb).'},
  {q:'______ are the best students in class.',opts:['They','Them'],ans:'They',tip:'"They" is a subject pronoun (before the verb).'},
  {q:'I bought flowers for ______. She loved them.',opts:['her','she'],ans:'her',tip:'"Her" is object pronoun (after preposition "for").'},
  {q:'The teacher gave ______ a lot of homework.',opts:['us','we'],ans:'us',tip:'"Us" is indirect object pronoun.'}
]},
{name:'Present Simple & Continuous',desc:'Habits vs. right now',color:'#22c55e',questions:[
  {q:'She ______ to school every day.',opts:['goes','is going'],ans:'goes',tip:'"Every day" = routine = Present Simple.'},
  {q:'Look! They ______ football now.',opts:['play','are playing'],ans:'are playing',tip:'"Now" = happening right now = Present Continuous.'},
  {q:'I usually ______ cereal for breakfast.',opts:['am eating','eat'],ans:'eat',tip:'"Usually" = habit = Present Simple.'},
  {q:'Right now, he ______ a book.',opts:['reads','is reading'],ans:'is reading',tip:'"Right now" = happening now = Present Continuous.'},
  {q:'Water ______ at 100 degrees Celsius.',opts:['boils','is boiling'],ans:'boils',tip:'Scientific facts use Present Simple.'},
  {q:'Be quiet! The baby ______.',opts:['sleeps','is sleeping'],ans:'is sleeping',tip:'Temporary situation happening now = Present Continuous.'},
  {q:'My dad ______ coffee every morning.',opts:['drinks','is drinking'],ans:'drinks',tip:'"Every morning" = routine = Present Simple.'},
  {q:'Listen! Someone ______ the piano.',opts:['plays','is playing'],ans:'is playing',tip:'"Listen!" = happening now = Present Continuous.'},
  {q:'The train ______ at 9 o\'clock.',opts:['leaves','is leaving'],ans:'leaves',tip:'Timetables use Present Simple.'},
  {q:'I can\'t talk now. I ______ dinner.',opts:['cook','am cooking'],ans:'am cooking',tip:'"Now" = happening now = Present Continuous.'}
]},
{name:'Question Words',desc:'Who, What, Where, When, Why, How',color:'#f59e0b',questions:[
  {q:'______ is your favourite colour?',opts:['What','Where','Why'],ans:'What',tip:'"What" asks about things.'},
  {q:'______ do you live?',opts:['Where','Who','When'],ans:'Where',tip:'"Where" asks about places.'},
  {q:'______ is your birthday?',opts:['When','Why','How'],ans:'When',tip:'"When" asks about time.'},
  {q:'______ are you sad today?',opts:['Why','What','Who'],ans:'Why',tip:'"Why" asks about reasons.'},
  {q:'______ is that boy? He looks familiar.',opts:['Who','Where','What'],ans:'Who',tip:'"Who" asks about people.'},
  {q:'______ old are you?',opts:['How','What','Why'],ans:'How',tip:'"How" asks about manner, degree, or amount.'},
  {q:'______ time does school start?',opts:['What','When','How'],ans:'What',tip:'"What time" asks about specific time.'},
  {q:'______ many brothers do you have?',opts:['How','What','Who'],ans:'How',tip:'"How many" asks about quantity.'},
  {q:'______ is your favourite singer?',opts:['Who','What','Where'],ans:'Who',tip:'"Who" asks about people (singer = person).'},
  {q:'______ does this word mean?',opts:['What','Why','How'],ans:'What',tip:'"What" asks about the definition/meaning.'}
]},
{name:'Past Simple',desc:'Regular & irregular verbs',color:'#ef4444',questions:[
  {q:'I ______ to the cinema last night.',opts:['went','goed'],ans:'went',tip:'"Go" is irregular: go → went → gone.'},
  {q:'She ______ her homework yesterday.',opts:['did','does'],ans:'did',tip:'"Do" in past simple = "did".'},
  {q:'We ______ a great time at the party.',opts:['had','haved'],ans:'had',tip:'"Have" is irregular: have → had → had.'},
  {q:'They ______ football on Saturday.',opts:['played','plaied'],ans:'played',tip:'Regular verb: play + ed = played.'},
  {q:'He ______ the answer to the question.',opts:['knew','knowed'],ans:'knew',tip:'"Know" is irregular: know → knew → known.'},
  {q:'I ______ pizza for dinner last night.',opts:['ate','eated'],ans:'ate',tip:'"Eat" is irregular: eat → ate → eaten.'},
  {q:'She ______ very hard for the exam.',opts:['studied','studyed'],ans:'studied',tip:'Verbs ending in consonant+y: y → ied.'},
  {q:'______ you see the film last weekend?',opts:['Did','Do'],ans:'Did',tip:'Past simple questions: Did + subject + infinitive.'},
  {q:'They ______ arrive on time.',opts:['didn\'t','don\'t'],ans:'didn\'t',tip:'Past simple negatives: didn\'t + infinitive.'},
  {q:'My parents ______ me a new phone.',opts:['bought','buyed'],ans:'bought',tip:'"Buy" is irregular: buy → bought → bought.'}
]},
{name:'Comparatives & Superlatives',desc:'bigger, the biggest',color:'#ec4899',questions:[
  {q:'London is ______ than Madrid.',opts:['bigger','more big'],ans:'bigger',tip:'Short adjectives: add -er (big → bigger).'},
  {q:'This is the ______ film I\'ve ever seen.',opts:['best','goodest'],ans:'best',tip:'"Good" is irregular: good → better → best.'},
  {q:'English is ______ than Maths for me.',opts:['easier','more easy'],ans:'easier',tip:'Adjectives ending in -y: change to -ier.'},
  {q:'She is the ______ student in class.',opts:['most intelligent','intelligentest'],ans:'most intelligent',tip:'Long adjectives: use "most" + adjective.'},
  {q:'A car is ______ than a bicycle.',opts:['faster','more fast'],ans:'faster',tip:'Short adjectives: add -er (fast → faster).'},
  {q:'This is the ______ book in the library.',opts:['worst','baddest'],ans:'worst',tip:'"Bad" is irregular: bad → worse → worst.'},
  {q:'Summer is ______ than winter.',opts:['hotter','more hot'],ans:'hotter',tip:'Short adjectives ending in consonant: double it + er.'},
  {q:'This exercise is ______ than the last one.',opts:['more difficult','difficulter'],ans:'more difficult',tip:'Long adjectives: use "more" + adjective.'},
  {q:'He is the ______ person I know.',opts:['funniest','most funny'],ans:'funniest',tip:'Adjectives ending in -y: y → iest for superlative.'},
  {q:'My marks are ______ than last year.',opts:['better','gooder'],ans:'better',tip:'"Good" is irregular: good → better → best.'}
]}
];

let playerName='',currentTopic=null,qIdx=0,score=0,streak=0,bestStreak=0,correctCount=0;

function init(){
  if(typeof PIT_SCORE!=='undefined'){const p=PIT_SCORE.getPlayer();if(p.name){playerName=p.name;score=p.stations.grammar?.score||0}}
  buildTopics();
  if(playerName)startApp();
}

function buildTopics(){
  document.getElementById('topicsGrid').innerHTML=TOPICS.map((t,i)=>
    '<div class="topic-card" data-testid="topic-'+i+'" onclick="selectTopic('+i+')">'+
    '<h3 style="color:'+t.color+'">'+t.name+'</h3>'+
    '<p>'+t.desc+' ('+t.questions.length+' questions)</p></div>'
  ).join('');
}

function startApp(){
  const inp=document.getElementById('nameInput');
  if(!playerName&&inp){playerName=inp.value.trim();if(!playerName){alert('Enter your name');return}if(typeof PIT_SCORE!=='undefined')PIT_SCORE.setName(playerName)}
  document.getElementById('login').classList.remove('active');
  document.getElementById('main').classList.add('active');
  document.getElementById('pName').textContent=playerName;
}

function showTopics(){
  closeModal();
  document.getElementById('topicsView').style.display='block';
  document.getElementById('quizView').style.display='none';
}

function selectTopic(idx){
  currentTopic=TOPICS[idx];qIdx=0;
  document.getElementById('hTopic').textContent=currentTopic.name;
  document.getElementById('topicsView').style.display='none';
  document.getElementById('quizView').style.display='block';
  showQuestion();
}

function showQuestion(){
  if(qIdx>=currentTopic.questions.length){completeTopic();return}
  const q=currentTopic.questions[qIdx];
  document.getElementById('qNum').textContent=(qIdx+1)+' / '+currentTopic.questions.length;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('explain').style.display='none';
  document.getElementById('qOpts').innerHTML=q.opts.map((o,i)=>
    '<button class="opt" data-testid="opt-'+i+'" onclick="answer(this,\''+o.replace(/'/g,"\\'")+'\')">'+o+'</button>'
  ).join('');
  document.getElementById('qFb').textContent='Choose the correct answer.';
  document.getElementById('qFb').className='fb info';
  document.getElementById('progBar').style.width=(qIdx/currentTopic.questions.length*100)+'%';
}

window.answer=function(btn,chosen){
  const q=currentTopic.questions[qIdx];
  document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});
  document.getElementById('explain').textContent=q.tip;
  document.getElementById('explain').style.display='block';
  if(chosen===q.ans){
    score+=10;streak++;correctCount++;if(streak>bestStreak)bestStreak=streak;
    document.getElementById('qFb').textContent='Correct! +10 points';
    document.getElementById('qFb').className='fb ok';
  }else{
    btn.classList.add('wrong');streak=0;
    document.getElementById('qFb').textContent='Not quite. The answer is: '+q.ans;
    document.getElementById('qFb').className='fb bad';
  }
  document.getElementById('hScore').textContent=score;
  document.getElementById('hStreak').textContent=streak;
  setTimeout(()=>{qIdx++;showQuestion()},2000);
};

function completeTopic(){
  if(typeof PIT_SCORE!=='undefined')PIT_SCORE.addScore('grammar',score);
  document.getElementById('finalScore').textContent=score+' pts';
  document.getElementById('modalMsg').textContent=correctCount>7?'Excellent grammar!':correctCount>4?'Good practice!':'Keep practising!';
  document.getElementById('doneModal').classList.add('active');
  document.getElementById('progBar').style.width='100%';
}

function closeModal(){document.getElementById('doneModal').classList.remove('active')}

init();
</script>
</body>
</html>
